version: "3.8"

services:

  # --- REVERSE PROXY ---
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - internal
    deploy:
      placement:
        constraints:
          - node.role == manager

  # --- BASE DE DONNÉES ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebula
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      placement:
        constraints:
          - node.role == manager

  # --- BROKER DE MESSAGES ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nebula
      RABBITMQ_DEFAULT_PASS: rabbit_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal
    deploy:
      placement:
        constraints:
          - node.role == manager

  # --- STOCKAGE MÉDIAS ---
  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    command: server /data
    environment:
      MINIO_ROOT_USER: nebula
      MINIO_ROOT_PASSWORD: minio_secret_key
    volumes:
      - minio_data:/data
    networks:
      - internal
    deploy:
      placement:
        constraints:
          - node.role == manager
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    volumes:
      - /home/etudiant/nebula/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - internal
      - public
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:latest
    networks:
      - internal
      - public
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # --- MICROSERVICES ---
  auth-service:
    image: 10.100.5.145:5000/auth-service:1.2
    networks:
      - public
      - internal
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
        - "traefik.http.services.auth.loadbalancer.server.port=3000"

  post-service:
    image: 10.100.5.145:5000/post-service:1.2
    networks:
      - public
      - internal
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.post.rule=PathPrefix(`/posts`)"
        - "traefik.http.services.post.loadbalancer.server.port=3001"

  timeline-service:
    image: 10.100.5.145:5000/timeline-service:1.2
    networks:
      - public
      - internal
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.timeline.rule=PathPrefix(`/timeline`)"
        - "traefik.http.services.timeline.loadbalancer.server.port=3002"

  notification-service:
    image: 10.100.5.145:5000/notification-service:1.3
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.notification.rule=PathPrefix(`/notifications`)"
        - "traefik.http.services.notification.loadbalancer.server.port=3003"

  media-service:
    image: 10.100.5.145:5000/media-service:1.5
    environment:
     MINIO_HOST: "tasks.minio"
    networks:
      - public
      - internal
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.media.rule=PathPrefix(`/upload`) || PathPrefix(`/files`)"
        - "traefik.http.services.media.loadbalancer.server.port=3004"

networks:
  public:
    external: true
  internal:
    external: true

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:

secrets:
  postgres_password:
    external: true
  rabbitmq_password:
    external: true
  minio_secret_key:
    external: true
